name: pkgdown
on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-pandoc@v2
      - name: Install system dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libfontconfig1-dev libharfbuzz-dev libfribidi-dev libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev libuv1-dev
      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages(c("remotes","pkgdown"), repos="https://cloud.r-project.org")'
          Rscript -e 'remotes::install_deps(dependencies=TRUE)'
          Rscript -e 'remotes::install_local(force=TRUE)'
      - name: Build site
        run: Rscript -e 'pkgdown::build_site(new_process=FALSE)'
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
