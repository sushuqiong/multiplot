url: https://sushuqiong.github.io/multiplot/
template:
  bootstrap: 5
navbar:
  structure:
    left:  [reference, articles, news]
    right: [github]
  components:
    reference:
      text: Reference
      href: reference/index.html
    articles:
      text: Articles
      href: articles/index.html
    github:
      icon: fa-github
      href: https://github.com/sushuqiong/multiplot
reference:
- title: Style Entry Point
  contents: ggchoice
- title: Prism Geoms
  contents:
  - geom_errorbar_prism
  - geom_col_prism
  - geom_boxplot_prism
- title: Statistical Annotations
  contents: stat_compare_means_prism
- title: Continuous Scales
  contents: matches("scale_(color|fill)_.*_c$")
- title: Shape Scales
  contents: matches("scale_shape_.*")
